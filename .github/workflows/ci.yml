name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 matches Kaggle's runtime; 3.12 guards against drift.
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv venv --python ${{ matrix.python-version }} .venv

      - name: Install package
        run: uv pip install --python .venv/bin/python -e ".[dev]"

      - name: Lint
        run: |
          .venv/bin/ruff check src tests
          .venv/bin/ruff format --check src tests

      - name: Type-check
        run: .venv/bin/mypy

      - name: Test
        run: .venv/bin/python -m pytest -q --cov=kaggle_pipeline --cov-report=term-missing
